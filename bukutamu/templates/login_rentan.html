<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Admin [RENTAN]</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: white; border-radius: 14px; padding: 36px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h2 { font-size: 20px; color: #333; margin-bottom: 4px; }
    p { font-size: 13px; color: #888; margin-bottom: 24px; }
    .warn { background: #fff3cd; border-left: 4px solid #f39c12; padding: 10px 14px; font-size: 12px; color: #856404; margin-bottom: 20px; border-radius: 6px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .error { color: #c0392b; font-size: 13px; margin-bottom: 14px; }
    button { width: 100%; padding: 12px; background: #c0392b; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .hint { font-size: 12px; color: #aaa; margin-top: 16px; text-align: center; }
    code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
<div class="box">
  <h2>🔐 Login Admin</h2>
  <p>Panel administrasi buku tamu</p>
  <div class="warn">
    ⚠️ Rentan SQL Injection. Coba input:<br>
    Username: <code>' OR '1'='1' --</code><br>
    Password: <code>apapun</code>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="admin" required>
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">Masuk</button>
  </form>
  <div class="hint"><a href="/" style="color:#888;">← Kembali ke buku tamu</a></div>
</div>
</body>
</html>
