<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Admin [RENTAN]</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 30px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 20px; color: #333; }
    a.logout { color: #c0392b; font-size: 13px; text-decoration: none; }
    .warn { background: #fff3cd; border-left: 4px solid #f39c12; padding: 10px 14px; font-size: 13px; color: #856404; margin-bottom: 20px; border-radius: 6px; }
    table { width: 100%; background: white; border-radius: 10px; border-collapse: collapse; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    th { background: #c0392b; color: white; padding: 12px 16px; text-align: left; font-size: 13px; }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    .del { color: #c0392b; text-decoration: none; font-size: 12px; font-weight: 600; }
    .del:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <h1>🛠️ Dashboard Admin — Versi Rentan</h1>
    <a href="/admin/logout" class="logout">Logout</a>
  </div>
  <div class="warn">
    ⚠️ IDOR aktif: hapus tamu bisa diakses tanpa login dengan langsung akses URL <code>/admin/hapus/[id]</code>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>Nama</th><th>Email</th><th>Pesan</th><th>Waktu</th><th>Aksi</th></tr>
    </thead>
    <tbody>
      {% for t in tamu_list %}
      <tr>
        <td>{{ t[0] }}</td>
        <td>{{ t[1] }}</td>
        <td>{{ t[2] }}</td>
        <td>{{ t[3]|safe }}</td>
        <td>{{ t[4] }}</td>
        <td><a href="/admin/hapus/{{ t[0] }}" class="del" onclick="return confirm('Hapus?')">Hapus</a></td>
      </tr>
      {% else %}
      <tr><td colspan="6" class="empty">Belum ada data tamu.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
</body>
</html>
